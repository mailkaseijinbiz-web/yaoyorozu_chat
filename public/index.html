<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>AR Agents 2 - 精霊召喚プロトタイプ</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== スキャンフェーズ ===== -->
    <div id="scan-container">
      <video id="camera-feed" autoplay playsinline muted></video>
      <canvas id="camera-overlay-canvas"></canvas>

      <div id="capture-guide">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>

      <div id="guide-text" class="slot-blue">1つ目の器（青の魂）を枠に収めて凝視</div>

      <div id="gauge-container">
        <div id="gauge-label">🔮 注入ゲージ <span id="gauge-pct">0%</span></div>
        <div id="gauge-track"><div id="gauge-fill"></div></div>
      </div>

      <div id="scan-status">AIスキャン作動中...</div>

      <div class="scan-controls">
        <button id="reset-btn" class="sub-btn">🔄 最初からやり直す</button>
      </div>
    </div>

    <!-- 注入フラッシュ -->
    <div id="flash-overlay"></div>

    <!-- コンパイル中オーバーレイ -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <div id="loading-text">魂を抽出中...</div>
    </div>

    <!-- ===== ARフェーズ ===== -->
    <div id="ar-ui-container" class="hidden">
      <div id="ar-status">器を探しています...</div>
      <div id="transcript" class="hidden"></div>
      <div class="ar-controls">
        <button id="banter-btn">💬 精霊たちを会話させる</button>
        <button id="ar-reset-btn" class="sub-btn">🔄 最初からやり直す</button>
      </div>
    </div>
    <div id="ar-scene-container"></div>

    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <script src="app.js"></script>
  </body>
</html>
