<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <title>AR Agents 2 - 精霊召喚プロトタイプ</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0b0f19" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AR Agents 2" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-compiler.prod.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ARシーン (背面) -->
    <div id="ar-scene-container"></div>

    <!-- スキャン用カメラ (初期フェーズ) -->
    <video id="camera-feed" autoplay playsinline muted></video>

    <!-- 共通オーバーレイUI -->
    <div id="overlay-ui">
      <canvas id="camera-overlay-canvas"></canvas>

      <div id="capture-guide">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div id="scan-line"></div>
      </div>

      <div id="guide-text">精霊を凝視して召喚せよ...</div>

      <div id="scan-status"></div>

      <div id="toast" class="hidden"></div>

      <div id="mode-toggle" class="hidden">
        <button id="mode-scan-btn" class="mode-btn active">スキャン</button>
        <button id="mode-banter-btn" class="mode-btn">会話</button>
      </div>

      <button id="reset-btn" class="hidden">リセット</button>
    </div>

    <!-- 注入フラッシュ -->
    <div id="flash-overlay"></div>

    <!-- コンパイル中オーバーレイ -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <div id="loading-text">魂を抽出中...</div>
    </div>

    <canvas id="snapshot-canvas" style="display:none;"></canvas>
    <div id="debug-overlay"></div>

    <script src="app.js"></script>
  </body>
</html>
